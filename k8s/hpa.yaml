apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler

metadata:
  name: house-price-hpa
  namespace: house-price

spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: house-price
  
  minReplicas: 1
  maxReplicas: 5

  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70